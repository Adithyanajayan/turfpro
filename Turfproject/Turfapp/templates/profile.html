<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #4e73df;
            --secondary-color: #f8f9fc;
            --text-color: #5a5c69;
        }
        
        body {
            background-color: #f8f9fc;
            color: var(--text-color);
            font-family: 'Nunito', sans-serif;
        }
        
        .profile-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            max-width: 800px;
            margin: 2rem auto;
        }
        
        .profile-header {
            background: var(--primary-color);
            color: white;
            padding: 2rem;
            text-align: center;
            position: relative;
        }
        
        .profile-pic {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 5px solid white;
            object-fit: cover;
            margin-bottom: 1rem;
        }
        
        .profile-body {
            padding: 2rem;
        }
        
        .profile-field {
            display: flex;
            margin-bottom: 1.5rem;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .profile-field label {
            flex: 0 0 150px;
            font-weight: 600;
        }
        
        .profile-field .value {
            flex: 1;
            padding: 0.5rem;
            min-height: 40px;
            display: flex;
            align-items: center;
        }
        
        .profile-field input, .profile-field select {
            flex: 1;
            padding: 0.5rem;
            border: 1px solid #ddd;
            border-radius: 5px;
            display: none;
        }
        
        .edit-btn {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .edit-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        
        .action-btns {
            display: none;
            justify-content: flex-end;
            gap: 1rem;
            margin-top: 2rem;
        }
        
        .btn-save {
            background: var(--primary-color);
            color: white;
        }
        
        .btn-cancel {
            background: #e74a3b;
            color: white;
        }
        
        .editing .value {
            display: none;
        }
        
        .editing input, .editing select {
            display: block;
        }
        
        .editing .action-btns {
            display: flex;
        }
        
        .role-badge {
            padding: 0.35rem 0.65rem;
            border-radius: 50rem;
            font-weight: 600;
        }
        
        .role-player {
            background: #e6f7ff;
            color: #1890ff;
        }
        
        .role-owner {
            background: #fff7e6;
            color: #fa8c16;
        }
    </style>
</head>
<body>
    <div class="profile-card">
        <div class="profile-header">
            <button class="edit-btn" id="editToggleBtn">
                <i class="fas fa-pencil-alt"></i>
            </button>
            <img src="https://ui-avatars.com/api/?name={{ request.user.first_name }}+{{ request.user.last_name }}&background=3a5a78&color=fff" alt="Profile" class="profile-pic" id="profilePic">
            <h2 id="fullName">{{request.user.first_name}} {{request.user.last_name}}</h2>
            <div class="role-badge" id="roleBadge">{{request.user.role}}</div>
        </div>
        
        <div class="profile-body">
            <div class="profile-field">
                <label>Username</label>
                <div class="value" id="usernameValue">{{request.user.username}}</div>
                <input type="text" id="usernameInput" value="{{request.user.username}}" disabled>
            </div>
           <form method="post"> 
            {% csrf_token %}
            <div class="profile-field">
                <label>First Name</label>
                <div class="value" id="firstNameValue">{{request.user.first_name}}</div>
                <input type="text" id="firstNameInput" name="first_name">
            </div>
            
            <div class="profile-field">
                <label>Last Name</label>
                <div class="value" id="lastNameValue">{{request.user.last_name}}</div>
                <input type="text" id="lastNameInput" name="last_name">
            </div>
            
            <div class="profile-field">
                <label>Email</label>
                <div class="value" id="emailValue">{{request.user.email}}</div>
                <input type="email" id="emailInput" name="email" value="{{request.user.email}}" disabled>
            </div>
            
            <div class="profile-field">
                <label>Phone</label>
                <div class="value" id="phoneValue">{{request.user.phone}}</div>
                <input type="tel" id="phoneInput" name="phone">
            </div>
            
            <div class="profile-field">
                <label>Role</label>
                <div class="value" id="roleValue">{{request.user.role}}</div>
                <input type="text" id="roleInput" name="role" value="{{request.user.role}}" disabled>
                
            </div>
            
            <div class="action-btns">
                <button class="btn btn-save" id="saveBtn">Save Changes</button>
                <button class="btn btn-cancel" id="cancelBtn">Cancel</button>
            </div>
            </form> 
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const editToggleBtn = document.getElementById('editToggleBtn');
            const saveBtn = document.getElementById('saveBtn');
            const cancelBtn = document.getElementById('cancelBtn');
            const profileCard = document.querySelector('.profile-card');
            
            // Toggle edit mode
            editToggleBtn.addEventListener('click', function() {
                profileCard.classList.toggle('editing');
            });
            
            // Save changes
            saveBtn.addEventListener('click', function() {
                // Update the displayed values with the input values
                document.getElementById('firstNameValue').textContent = document.getElementById('firstNameInput').value;
                document.getElementById('lastNameValue').textContent = document.getElementById('lastNameInput').value;
                document.getElementById('emailValue').textContent = document.getElementById('emailInput').value;
                document.getElementById('phoneValue').textContent = document.getElementById('phoneInput').value;
                
                // Update role
                const roleInput = document.getElementById('roleInput');
                const roleValue = roleInput.value;
                document.getElementById('roleValue').textContent = roleInput.options[roleInput.selectedIndex].text;
                
                // Update role badge
                const roleBadge = document.getElementById('roleBadge');
                roleBadge.textContent = roleInput.options[roleInput.selectedIndex].text;
                roleBadge.className = 'role-badge ' + (roleValue === 'player' ? 'role-player' : 'role-owner');
                
                // Update full name
                document.getElementById('fullName').textContent = 
                    `${document.getElementById('firstNameInput').value} ${document.getElementById('lastNameInput').value}`;
                
                // Update profile picture (just for demo)
                const initials = `${document.getElementById('firstNameInput').value.charAt(0)}${document.getElementById('lastNameInput').value.charAt(0)}`;
                document.getElementById('profilePic').src = `https://ui-avatars.com/api/?name=${initials}&background=random`;
                
                // Exit edit mode
                profileCard.classList.remove('editing');
                
                // In a real app, you would send these changes to the server here
                // const userData = {
                //     first_name: document.getElementById('firstNameInput').value,
                //     last_name: document.getElementById('lastNameInput').value,
                //     email: document.getElementById('emailInput').value,
                //     phone: document.getElementById('phoneInput').value,
                //     role: document.getElementById('roleInput').value
                // };
                // fetch('/api/update-profile', {
                //     method: 'POST',
                //     headers: {
                //         'Content-Type': 'application/json',
                //     },
                //     body: JSON.stringify(userData)
                // })
                // .then(response => response.json())
                // .then(data => console.log('Success:', data))
                // .catch(error => console.error('Error:', error));
            });
            
            // Cancel editing
            cancelBtn.addEventListener('click', function() {
                // Reset inputs to current values
                document.getElementById('firstNameInput').value = document.getElementById('firstNameValue').textContent;
                document.getElementById('lastNameInput').value = document.getElementById('lastNameValue').textContent;
                document.getElementById('emailInput').value = document.getElementById('emailValue').textContent;
                document.getElementById('phoneInput').value = document.getElementById('phoneValue').textContent;
                
                // Exit edit mode
                profileCard.classList.remove('editing');
            });
            
            // Initialize role select to match displayed value
            function setInitialRole() {
                const roleText = document.getElementById('roleValue').textContent.toLowerCase();
                const roleInput = document.getElementById('roleInput');
                for (let i = 0; i < roleInput.options.length; i++) {
                    if (roleInput.options[i].text.toLowerCase() === roleText) {
                        roleInput.selectedIndex = i;
                        break;
                    }
                }
            }
            
            setInitialRole();
        });
    </script>
</body>
</html>
